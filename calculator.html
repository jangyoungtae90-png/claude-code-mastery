<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calculator-btn {
            transition: all 0.2s ease;
        }

        .calculator-btn:active {
            transform: scale(0.95);
        }

        .display {
            font-family: 'Courier New', monospace;
            word-wrap: break-word;
            word-break: break-all;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden w-full max-w-sm">
        <!-- 화면 영역 -->
        <div class="bg-gray-900 p-6">
            <div class="display bg-gray-800 text-white text-right text-4xl font-bold p-4 rounded-lg mb-4 min-h-20 flex items-end justify-end break-words" id="display">
                0
            </div>
            <div class="text-gray-400 text-sm text-right px-4" id="expression">
                &nbsp;
            </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="p-6 bg-gray-50">
            <div class="grid grid-cols-4 gap-3">
                <!-- 첫 번째 행 -->
                <button onclick="clearDisplay()" class="calculator-btn col-span-2 bg-red-500 hover:bg-red-600 text-white font-bold text-lg py-4 rounded-lg">
                    AC
                </button>
                <button onclick="deleteLast()" class="calculator-btn bg-orange-500 hover:bg-orange-600 text-white font-bold text-lg py-4 rounded-lg">
                    ←
                </button>
                <button onclick="appendOperator('/')" class="calculator-btn bg-blue-500 hover:bg-blue-600 text-white font-bold text-lg py-4 rounded-lg">
                    ÷
                </button>

                <!-- 두 번째 행 -->
                <button onclick="appendNumber('7')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    7
                </button>
                <button onclick="appendNumber('8')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    8
                </button>
                <button onclick="appendNumber('9')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    9
                </button>
                <button onclick="appendOperator('*')" class="calculator-btn bg-blue-500 hover:bg-blue-600 text-white font-bold text-lg py-4 rounded-lg">
                    ×
                </button>

                <!-- 세 번째 행 -->
                <button onclick="appendNumber('4')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    4
                </button>
                <button onclick="appendNumber('5')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    5
                </button>
                <button onclick="appendNumber('6')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    6
                </button>
                <button onclick="appendOperator('-')" class="calculator-btn bg-blue-500 hover:bg-blue-600 text-white font-bold text-lg py-4 rounded-lg">
                    −
                </button>

                <!-- 네 번째 행 -->
                <button onclick="appendNumber('1')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    1
                </button>
                <button onclick="appendNumber('2')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    2
                </button>
                <button onclick="appendNumber('3')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    3
                </button>
                <button onclick="appendOperator('+')" class="calculator-btn bg-blue-500 hover:bg-blue-600 text-white font-bold text-lg py-4 rounded-lg">
                    +
                </button>

                <!-- 다섯 번째 행 -->
                <button onclick="appendNumber('0')" class="calculator-btn col-span-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    0
                </button>
                <button onclick="appendNumber('.')" class="calculator-btn bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold text-lg py-4 rounded-lg">
                    .
                </button>
                <button onclick="calculate()" class="calculator-btn bg-green-500 hover:bg-green-600 text-white font-bold text-lg py-4 rounded-lg">
                    =
                </button>
            </div>
        </div>
    </div>

    <script>
        let display = '0';
        let expression = '';
        let previousValue = '';
        let currentOperator = '';
        let shouldResetDisplay = false;

        function updateDisplay() {
            document.getElementById('display').textContent = display;
            document.getElementById('expression').textContent = expression || '&nbsp;';
        }

        // 숫자 추가
        function appendNumber(num) {
            // 화면 초기화 후 첫 입력이면 새로 시작
            if (shouldResetDisplay) {
                display = num;
                shouldResetDisplay = false;
            } else {
                // 0으로 시작하는 경우 처리
                if (display === '0' && num !== '.') {
                    display = num;
                } else if (num === '.' && display.includes('.')) {
                    return; // 소수점 중복 방지
                } else {
                    display += num;
                }
            }
            updateDisplay();
        }

        // 연산자 추가
        function appendOperator(operator) {
            // 이미 연산자가 있으면 먼저 계산
            if (currentOperator && !shouldResetDisplay) {
                calculate();
            }

            previousValue = display;
            currentOperator = operator;
            shouldResetDisplay = true;

            // 연산식 표시
            const operatorMap = {
                '+': '+',
                '-': '−',
                '*': '×',
                '/': '÷'
            };
            expression = previousValue + ' ' + operatorMap[operator];
            updateDisplay();
        }

        // 계산 실행
        function calculate() {
            if (!currentOperator || shouldResetDisplay) {
                return;
            }

            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(display);

            switch (currentOperator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current !== 0 ? prev / current : 0;
                    if (current === 0) {
                        alert('0으로 나눌 수 없습니다');
                        display = '0';
                        updateDisplay();
                        return;
                    }
                    break;
                default:
                    return;
            }

            // 소수점 자리수 처리
            result = Math.round(result * 100000000) / 100000000;
            display = result.toString();
            expression = '';
            currentOperator = '';
            shouldResetDisplay = true;
            updateDisplay();
        }

        // 마지막 숫자 삭제
        function deleteLast() {
            if (display.length > 1) {
                display = display.slice(0, -1);
            } else {
                display = '0';
            }
            updateDisplay();
        }

        // 화면 초기화
        function clearDisplay() {
            display = '0';
            expression = '';
            previousValue = '';
            currentOperator = '';
            shouldResetDisplay = false;
            updateDisplay();
        }

        // 키보드 지원
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                appendNumber(event.key);
            } else if (event.key === '.') {
                appendNumber('.');
            } else if (event.key === '+' || event.key === '-') {
                appendOperator(event.key);
            } else if (event.key === '*') {
                event.preventDefault();
                appendOperator('*');
            } else if (event.key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (event.key === 'Enter' || event.key === '=') {
                event.preventDefault();
                calculate();
            } else if (event.key === 'Backspace') {
                deleteLast();
            } else if (event.key === 'Escape') {
                clearDisplay();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
