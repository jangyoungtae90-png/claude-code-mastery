<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투두 리스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 완료된 항목 스타일 */
        .todo-item.completed span {
            text-decoration: line-through;
            color: #999;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-8">
    <div class="max-w-2xl mx-auto">
        <!-- 헤더 -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📝 투두 리스트</h1>
            <p class="text-gray-600">오늘 할 일을 관리해보세요</p>
        </div>

        <!-- 입력 영역 -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <div class="flex gap-2">
                <input
                    type="text"
                    id="todoInput"
                    placeholder="새로운 할 일을 입력하세요..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    onkeypress="if(event.key === 'Enter') addTodo()"
                >
                <button
                    onclick="addTodo()"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-medium transition duration-200"
                >
                    추가
                </button>
            </div>
        </div>

        <!-- 투두 리스트 -->
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <ul id="todoList" class="divide-y divide-gray-200">
                <li class="p-4 text-gray-500 text-center">
                    할 일을 추가해보세요 ✨
                </li>
            </ul>
        </div>

        <!-- 통계 -->
        <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-600 text-sm">전체 할 일</p>
                <p class="text-2xl font-bold text-gray-800" id="totalCount">0</p>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <p class="text-gray-600 text-sm">완료된 할 일</p>
                <p class="text-2xl font-bold text-green-600" id="completedCount">0</p>
            </div>
        </div>

        <!-- 초기화 버튼 -->
        <button
            onclick="clearAll()"
            class="w-full mt-6 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition duration-200"
        >
            모두 삭제
        </button>
    </div>

    <script>
        // 페이지 로드 시 저장된 데이터 불러오기
        window.addEventListener('DOMContentLoaded', loadTodos);

        // 새로운 투두 항목 추가
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (text === '') {
                alert('할 일을 입력해주세요');
                return;
            }

            const todoList = document.getElementById('todoList');

            // 빈 상태 메시지 제거
            if (todoList.children.length === 1 &&
                todoList.children[0].textContent.includes('추가해보세요')) {
                todoList.innerHTML = '';
            }

            // 새로운 투두 항목 생성
            const li = document.createElement('li');
            li.className = 'todo-item p-4 flex items-center justify-between hover:bg-gray-50 transition';
            li.innerHTML = `
                <div class="flex items-center gap-3 flex-1">
                    <input
                        type="checkbox"
                        class="w-5 h-5 text-blue-500 rounded cursor-pointer"
                        onchange="toggleTodo(this)"
                    >
                    <span class="text-gray-800">${escapeHtml(text)}</span>
                </div>
                <button
                    onclick="deleteTodo(this)"
                    class="text-red-500 hover:text-red-700 font-bold text-lg"
                >
                    ✕
                </button>
            `;

            todoList.appendChild(li);
            input.value = '';
            input.focus();
            saveTodos();
            updateStats();
        }

        // 투두 항목 완료 처리
        function toggleTodo(checkbox) {
            const todoItem = checkbox.closest('.todo-item');
            if (checkbox.checked) {
                todoItem.classList.add('completed');
            } else {
                todoItem.classList.remove('completed');
            }
            saveTodos();
            updateStats();
        }

        // 투두 항목 삭제
        function deleteTodo(button) {
            const todoItem = button.closest('li');
            todoItem.remove();

            // 모든 항목이 삭제되면 빈 상태 메시지 표시
            const todoList = document.getElementById('todoList');
            if (todoList.children.length === 0) {
                const emptyMessage = document.createElement('li');
                emptyMessage.className = 'p-4 text-gray-500 text-center';
                emptyMessage.textContent = '할 일을 추가해보세요 ✨';
                todoList.appendChild(emptyMessage);
            }

            saveTodos();
            updateStats();
        }

        // 모두 삭제
        function clearAll() {
            if (confirm('정말 모든 할 일을 삭제하시겠습니까?')) {
                document.getElementById('todoList').innerHTML = `
                    <li class="p-4 text-gray-500 text-center">
                        할 일을 추가해보세요 ✨
                    </li>
                `;
                saveTodos();
                updateStats();
            }
        }

        // 로컬스토리지에 저장
        function saveTodos() {
            const todos = [];
            document.querySelectorAll('.todo-item').forEach(li => {
                const checkbox = li.querySelector('input[type="checkbox"]');
                const text = li.querySelector('span').textContent;
                todos.push({
                    text: text,
                    completed: checkbox.checked
                });
            });
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // 로컬스토리지에서 로드
        function loadTodos() {
            const savedTodos = localStorage.getItem('todos');
            if (savedTodos) {
                const todos = JSON.parse(savedTodos);
                const todoList = document.getElementById('todoList');
                todoList.innerHTML = '';

                todos.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item p-4 flex items-center justify-between hover:bg-gray-50 transition ${
                        todo.completed ? 'completed' : ''
                    }`;
                    li.innerHTML = `
                        <div class="flex items-center gap-3 flex-1">
                            <input
                                type="checkbox"
                                class="w-5 h-5 text-blue-500 rounded cursor-pointer"
                                ${todo.completed ? 'checked' : ''}
                                onchange="toggleTodo(this)"
                            >
                            <span class="text-gray-800">${todo.text}</span>
                        </div>
                        <button
                            onclick="deleteTodo(this)"
                            class="text-red-500 hover:text-red-700 font-bold text-lg"
                        >
                            ✕
                        </button>
                    `;
                    todoList.appendChild(li);
                });
            }
            updateStats();
        }

        // 통계 업데이트
        function updateStats() {
            const todos = document.querySelectorAll('.todo-item');
            const completed = document.querySelectorAll('.todo-item.completed');

            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('completedCount').textContent = completed.length;
        }

        // HTML 이스케이프 (XSS 방지)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
