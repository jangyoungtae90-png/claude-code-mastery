<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카운터 앱</title>
    <!-- Tailwind CSS CDN 사용 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- 전체 페이지 중앙에 앱을 배치하는 컨테이너 -->
    <div class="flex items-center justify-center min-h-screen">
        <!-- 카운터 앱의 메인 박스 -->
        <div class="bg-white rounded-lg shadow-lg p-8 w-80">
            <!-- 제목 -->
            <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
                카운터 앱
            </h1>

            <!-- 카운트 숫자를 표시하는 영역 -->
            <!-- id="counter"로 JavaScript에서 이 요소를 찾을 수 있게 함 -->
            <div class="text-6xl font-bold text-center text-blue-600 mb-8 bg-gray-50 py-8 rounded-lg">
                <span id="counter">0</span>
            </div>

            <!-- 버튼들을 감싸는 컨테이너 -->
            <!-- flex로 가로 방향 정렬, gap-4로 버튼 사이에 여유 공간 -->
            <div class="flex gap-4 mb-6">
                <!-- 감소 버튼 (-1) -->
                <!-- onclick="decrementCounter()" 클릭 시 JavaScript 함수 실행 -->
                <button
                    onclick="decrementCounter()"
                    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition duration-200"
                >
                    -1
                </button>

                <!-- 증가 버튼 (+1) -->
                <!-- onclick="incrementCounter()" 클릭 시 JavaScript 함수 실행 -->
                <button
                    onclick="incrementCounter()"
                    class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition duration-200"
                >
                    +1
                </button>
            </div>

            <!-- 리셋 버튼 (빨간색으로 구분) -->
            <!-- onclick="resetCounter()" 클릭 시 JavaScript 함수 실행 -->
            <button
                onclick="resetCounter()"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition duration-200"
            >
                리셋
            </button>
        </div>
    </div>

    <!-- JavaScript 코드 -->
    <script>
        // 현재 카운트 값을 저장하는 변수
        let count = 0;

        // 카운트를 증가시키는 함수
        function incrementCounter() {
            count++;  // count 변수를 1 증가
            updateDisplay();  // 화면에 새로운 숫자를 표시
        }

        // 카운트를 감소시키는 함수
        function decrementCounter() {
            count--;  // count 변수를 1 감소
            updateDisplay();  // 화면에 새로운 숫자를 표시
        }

        // 카운트를 0으로 리셋하는 함수
        function resetCounter() {
            count = 0;  // count 변수를 0으로 설정
            updateDisplay();  // 화면에 0을 표시
        }

        // 화면에 현재 카운트를 표시하는 함수
        function updateDisplay() {
            // id="counter"인 요소(span 태그)를 찾아서
            // 그 안에 있는 텍스트를 현재 count 값으로 변경
            document.getElementById('counter').textContent = count;
        }
    </script>
</body>
</html>
